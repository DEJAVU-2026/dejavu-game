<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEJAVU - Dark MOBA Legends</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- ПАНЕЛЬ ВИБОРУ РАС --- */
        .race-selector {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            background: rgba(15, 10, 25, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(220, 38, 38, 0.5);
            padding: 5px 8px;
            border-radius: 20px;
            z-index: 10;
            pointer-events: auto;
        }
        .btn-race {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #b8b8b8;
            padding: 5px 9px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-race.active {
            background: rgba(220, 38, 38, 0.5);
            border-color: #ff4444;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* --- ВЕРХНІЙ HUD --- */
        .hud-container {
            position: absolute;
            top: 58px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(15, 10, 25, 0.8);
            border: 1px solid rgba(220, 38, 38, 0.3);
            padding: 8px 12px;
            border-radius: 8px;
            min-width: 160px;
        }
        .player-info {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
        }
        .hp-bar-bg {
            width: 100%;
            height: 8px;
            background: #2a1111;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 0, 0.4);
        }
        .hp-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #dc2626, #991b1b);
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            color: #facc15;
            font-size: 11px;
        }

        /* --- СЕНСОРНЕ КЕРУВАННЯ --- */
        .controls-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px 20px 25px;
        }
        .joystick-zone {
            width: 115px;
            height: 115px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(220, 38, 38, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            position: relative;
        }
        .joystick-stick {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle, #dc2626, #7f1d1d);
            border: 2px solid #fca5a5;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(220, 38, 38, 0.6);
            position: absolute;
        }
        .action-zone {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            pointer-events: auto;
        }
        .btn-game {
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-game:active { transform: scale(0.92); }
        .btn-skill { width: 55px; height: 55px; background: linear-gradient(135deg, #7c3aed, #5b21b6); border-color: #8b5cf6; font-size: 11px; }
        .btn-attack { width: 75px; height: 75px; background: linear-gradient(135deg, #dc2626, #991b1b); border-color: #f87171; font-size: 14px; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <!-- Вибір рас -->
    <div class="race-selector">
        <button class="btn-race active" onclick="selectRace('werewolf', this)">🐺 Оборотень</button>
        <button class="btn-race" onclick="selectRace('ghost', this)">👻 Привид</button>
        <button class="btn-race" onclick="selectRace('cadaver', this)">🧟 Кадавр</button>
        <button class="btn-race" onclick="selectRace('vampire', this)">🧛 Вампір</button>
    </div>

    <!-- HUD -->
    <div class="hud-container">
        <div class="player-info">
            <span id="race-title">Оборотень</span>
            <span style="color: #ef4444;">LVL 1</span>
        </div>
        <div class="hp-bar-bg"><div class="hp-bar-fill"></div></div>
        <div class="stats-row">
            <span>❤️ HP: <strong id="hp-txt">1200</strong></span>
            <span>⚡ Швидкість: <strong id="speed-txt">11.5</strong></span>
        </div>
    </div>

    <!-- Керування -->
    <div class="controls-layer">
        <div class="joystick-zone" id="joy-zone"><div class="joystick-stick" id="joy-stick"></div></div>
        <div class="action-zone">
            <button class="btn-game btn-skill" onclick="triggerSkill()">SKILL</button>
            <button class="btn-game btn-attack" onclick="triggerAttack()">ATTACK</button>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x05050a);
            scene.fog = new THREE.FogExp2(0x05050a, 0.02);

            const clock = new THREE.Clock();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 18, 18);
            camera.lookAt(0, 0, 0);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(15, 25, 15);
            scene.add(dirLight);

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(80, 80),
                new THREE.MeshStandardMaterial({ color: 0x0f1410, roughness: 0.9 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const grid = new THREE.GridHelper(80, 40, 0xef4444, 0x1f1b24);
            grid.position.y = 0.01;
            scene.add(grid);

            // Храм
            const templeGroup = new THREE.Group();
            templeGroup.position.set(0, 0, -10);
            const templeBase = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 6), new THREE.MeshStandardMaterial({ color: 0x181824 }));
            templeBase.position.y = 1.5;
            templeGroup.add(templeBase);
            const templeRoof = new THREE.Mesh(new THREE.ConeGeometry(4, 2, 4), new THREE.MeshStandardMaterial({ color: 0x7f1d1d }));
            templeRoof.position.y = 4;
            templeGroup.add(templeRoof);
            scene.add(templeGroup);

            // Гравець
            const playerGroup = new THREE.Group();
            scene.add(playerGroup);

            const heroLight = new THREE.PointLight(0xff0000, 2, 8);
            heroLight.position.set(0, 1.5, 0);
            playerGroup.add(heroLight);

            const auraRing = new THREE.Mesh(
                new THREE.RingGeometry(0.8, 1.1, 32),
                new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide })
            );
            auraRing.rotation.x = -Math.PI / 2;
            auraRing.position.y = 0.02;
            playerGroup.add(auraRing);

            let currentRaceModel = null;
            let baseSpeed = 11.5;
            let isFloating = false;

            function buildRaceModel(race) {
                if (currentRaceModel) playerGroup.remove(currentRaceModel);
                const raceGroup = new THREE.Group();
                isFloating = false;

                if (race === 'werewolf') {
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.4, 1.8, 12), new THREE.MeshStandardMaterial({ color: 0x451a03 }));
                    body.position.y = 0.9;
                    raceGroup.add(body);

                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 12), new THREE.MeshStandardMaterial({ color: 0x3a1502 }));
                    head.position.set(0, 1.8, 0.1);
                    raceGroup.add(head);

                    const snout = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.25, 0.4), new THREE.MeshStandardMaterial({ color: 0x270d01 }));
                    snout.position.set(0, 1.75, 0.4);
                    raceGroup.add(snout);

                    const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.1), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
                    eyeL.position.set(-0.15, 1.85, 0.32);
                    raceGroup.add(eyeL);
                    const eyeR = eyeL.clone();
                    eyeR.position.x = 0.15;
                    raceGroup.add(eyeR);

                    heroLight.color.setHex(0xff3300);
                    auraRing.material.color.setHex(0xff3300);
                    baseSpeed = 11.5;
                    document.getElementById('race-title').innerText = '🐺 Оборотень';
                    document.getElementById('hp-txt').innerText = '1200';

                } else if (race === 'ghost') {
                    isFloating = true;
                    const body = new THREE.Mesh(new THREE.ConeGeometry(0.55, 2.2, 16), new THREE.MeshStandardMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.7 }));
                    body.position.y = 1.1;
                    raceGroup.add(body);

                    const hood = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0x0284c7 }));
                    hood.position.set(0, 1.9, 0);
                    raceGroup.add(hood);

                    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                    eyeL.position.set(-0.12, 1.95, 0.32);
                    raceGroup.add(eyeL);
                    const eyeR = eyeL.clone();
                    eyeR.position.x = 0.12;
                    raceGroup.add(eyeR);

                    heroLight.color.setHex(0x00ffff);
                    auraRing.material.color.setHex(0x00ffff);
                    baseSpeed = 13.5;
                    document.getElementById('race-title').innerText = '👻 Привид';
                    document.getElementById('hp-txt').innerText = '800';

                } else if (race === 'cadaver') {
                    const body = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.7, 0.8), new THREE.MeshStandardMaterial({ color: 0x2e2338 }));
                    body.position.y = 0.85;
                    raceGroup.add(body);

                    const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.6, 0.65), new THREE.MeshStandardMaterial({ color: 0x3d304a }));
                    head.position.set(0, 1.8, 0);
                    raceGroup.add(head);

                    const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: 0x22c55e }));
                    eyeL.position.set(-0.15, 1.85, 0.31);
                    raceGroup.add(eyeL);
                    const eyeR = eyeL.clone();
                    eyeR.position.x = 0.15;
                    raceGroup.add(eyeR);

                    heroLight.color.setHex(0x22c55e);
                    auraRing.material.color.setHex(0x22c55e);
                    baseSpeed = 9.0;
                    document.getElementById('race-title').innerText = '🧟 Кадавр';
                    document.getElementById('hp-txt').innerText = '1500';

                } else if (race === 'vampire') {
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.9, 16), new THREE.MeshStandardMaterial({ color: 0x111115 }));
                    body.position.y = 0.95;
                    raceGroup.add(body);

                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), new THREE.MeshStandardMaterial({ color: 0xe2e8f0 }));
                    head.position.set(0, 1.85, 0);
                    raceGroup.add(head);

                    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: 0xef4444 }));
                    eyeL.position.set(-0.11, 1.88, 0.3);
                    raceGroup.add(eyeL);
                    const eyeR = eyeL.clone();
                    eyeR.position.x = 0.11;
                    raceGroup.add(eyeR);

                    heroLight.color.setHex(0xdc2626);
                    auraRing.material.color.setHex(0xdc2626);
                    baseSpeed = 12.0;
                    document.getElementById('race-title').innerText = '🧛 Вампір';
                    document.getElementById('hp-txt').innerText = '950';
                }

                document.getElementById('speed-txt').innerText = baseSpeed;
                currentRaceModel = raceGroup;
                playerGroup.add(currentRaceModel);
            }

            buildRaceModel('werewolf');

            window.selectRace = function(race, btn) {
                document.querySelectorAll('.btn-race').forEach(b => b.classList.remove('active'));
                if (btn) btn.classList.add('active');
                buildRaceModel(race);
            };

            // Джойстик
            const joyZone = document.getElementById('joy-zone');
            const joyStick = document.getElementById('joy-stick');
            let isDragging = false;
            let moveVector = { x: 0, z: 0 };

            function handleStart() { isDragging = true; }
            function handleMove(e) {
                if (!isDragging) return;
                const touch = e.touches ? e.touches[0] : e;
                const rect = joyZone.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const maxRadius = rect.width / 2;
                const distance = Math.hypot(dx, dy);

                if (distance > maxRadius) {
                    dx = (dx / distance) * maxRadius;
                    dy = (dy / distance) * maxRadius;
                }

                joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
                moveVector.x = dx / maxRadius;
                moveVector.z = dy / maxRadius;
            }

            function handleEnd() {
                isDragging = false;
                joyStick.style.transform = `translate(0px, 0px)`;
                moveVector = { x: 0, z: 0 };
            }

            joyZone.addEventListener('touchstart', handleStart, { passive: true });
            window.addEventListener('touchmove', handleMove, { passive: true });
            window.addEventListener('touchend', handleEnd);

            joyZone.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);

            window.triggerAttack = function() { console.log("⚔️ Атака!"); };
            window.triggerSkill = function() { console.log("⚡ Скілл!"); };

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            let timeTracker = 0;
            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();
                timeTracker += delta;

                if (moveVector.x !== 0 || moveVector.z !== 0) {
                    const moveStep = baseSpeed * delta;
                    playerGroup.position.x += moveVector.x * moveStep;
                    playerGroup.position.z += moveVector.z * moveStep;
                    playerGroup.rotation.y = Math.atan2(moveVector.x, moveVector.z);
                }

                if (isFloating) {
                    playerGroup.position.y = Math.sin(timeTracker * 4) * 0.25;
                } else {
                    playerGroup.position.y = 0;
                }

                camera.position.x = playerGroup.position.x;
                camera.position.z = playerGroup.position.z + 18;

                renderer.render(scene, camera);
            }
            animate();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEJAVU - Dark MOBA Legends</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- ПАНЕЛЬ ВИБОРУ РАС --- */
        .race-selector {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(15, 10, 25, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 0, 0, 0.5);
            padding: 6px 10px;
            border-radius: 20px;
            z-index: 10;
            pointer-events: auto;
        }
        .btn-race {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #b8b8b8;
            padding: 6px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-race.active {
            background: rgba(139, 0, 0, 0.5);
            border-color: #ff3333;
            color: #fff;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
        }

        /* --- ВЕРХНІЙ HUD --- */
        .hud-container {
            position: absolute;
            top: 60px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(15, 10, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 0, 0, 0.3);
            padding: 8px 14px;
            border-radius: 8px;
            min-width: 170px;
        }
        .player-info {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
        }
        .hp-bar-bg {
            width: 100%;
            height: 8px;
            background: #2a1111;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 0, 0.4);
        }
        .hp-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #dc2626, #991b1b);
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            color: #facc15;
            font-size: 11px;
        }

        /* --- СЕНСОРНЕ КЕРУВАННЯ --- */
        .controls-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px 20px 30px;
        }
        .joystick-zone {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(220, 38, 38, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            position: relative;
        }
        .joystick-stick {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #dc2626, #7f1d1d);
            border: 2px solid #fca5a5;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(220, 38, 38, 0.6);
            position: absolute;
        }
        .action-zone {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            pointer-events: auto;
        }
        .btn-game {
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-game:active { transform: scale(0.92); }
        .btn-skill { width: 55px; height: 55px; background: linear-gradient(135deg, #7c3aed, #5b21b6); border-color: #8b5cf6; font-size: 11px; }
        .btn-attack { width: 75px; height: 75px; background: linear-gradient(135deg, #dc2626, #991b1b); border-color: #f87171; font-size: 14px; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <!-- Вибір темних рас -->
    <div class="race-selector">
        <button class="btn-race active" onclick="selectRace('werewolf')">🐺 Оборотень</button>
        <button class="btn-race" onclick="selectRace('ghost')">👻 Привид</button>
        <button class="btn-race" onclick="selectRace('cadaver')">🧟 Кадавр</button>
        <button class="btn-race" onclick="selectRace('vampire')">🧛 Вампір</button>
    </div>

    <!-- HUD -->
    <div class="hud-container">
        <div class="player-info">
            <span id="race-title">Оборотень</span>
            <span style="color: #ef4444;">LVL 1</span>
        </div>
        <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp-fill"></div></div>
        <div class="stats-row">
            <span>❤️ HP: <strong id="hp-txt">1200</strong></span>
            <span>⚡ Швидкість: <strong id="speed-txt">11.5</strong></span>
        </div>
    </div>

    <!-- Керування -->
    <div class="controls-layer">
        <div class="joystick-zone" id="joy-zone">
            <div class="joystick-stick" id="joy-stick"></div>
        </div>
        <div class="action-zone">
            <button class="btn-game btn-skill" onclick="triggerSkill()">SKILL</button>
            <button class="btn-game btn-attack" onclick="triggerAttack()">ATTACK</button>
        </div>
    </div>

    <script>
        // --- THREE.JS SETUP ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        scene.fog = new THREE.FogExp2(0x05050a, 0.02);

        const clock = new THREE.Clock();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 18, 18);
        camera.lookAt(0, 0, 0);

        // Якісне підсвічування всієї арени
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(15, 25, 15);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Темна містична земля
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            new THREE.MeshStandardMaterial({ color: 0x0f1410, roughness: 0.9 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(80, 40, 0xef4444, 0x1f1b24);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- ДРЕВНЯ РУЇНА У ЦЕНТРІ ---
        const templeGroup = new THREE.Group();
        templeGroup.position.set(0, 0, -10);
        const templeBase = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 6), new THREE.MeshStandardMaterial({ color: 0x181824, roughness: 0.8 }));
        templeBase.position.y = 1.5;
        templeGroup.add(templeBase);
        const templeRoof = new THREE.Mesh(new THREE.ConeGeometry(4, 2, 4), new THREE.MeshStandardMaterial({ color: 0x7f1d1d }));
        templeRoof.position.y = 4;
        templeGroup.add(templeRoof);
        scene.add(templeGroup);

        // --- ГРУПА ПЕРСОНАЖА ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // ДИНАМІЧНЕ СЯЙВО ПІД ГЕРОЄМ (АУРА)
        const heroLight = new THREE.PointLight(0xff0000, 2, 8);
        heroLight.position.set(0, 1.5, 0);
        playerGroup.add(heroLight);

        // Кільце виділення під ногами
        const auraRing = new THREE.Mesh(
            new THREE.RingGeometry(0.8, 1.1, 32),
            new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide })
        );
        auraRing.rotation.x = -Math.PI / 2;
        auraRing.position.y = 0.02;
        playerGroup.add(auraRing);

        let currentRaceModel = null;
        let baseSpeed = 11.5;
        let isFloating = false;

        // --- ДЕТАЛІЗОВАНІ 3D МОДЕЛІ ДЛЯ 4 ДРЕВНІХ РАС ---
        function buildRaceModel(race) {
            if (currentRaceModel) playerGroup.remove(currentRaceModel);
            
            const raceGroup = new THREE.Group();
            isFloating = false;

            if (race === 'werewolf') {
                // 🐺 ОБОРОТЕНЬ: М'язистий, з мордою, вухами, пазурами та сяючими очима
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.4, 1.8, 12), new THREE.MeshStandardMaterial({ color: 0x451a03, roughness: 0.7 }));
                body.position.y = 0.9;
                raceGroup.add(body);

                // Голова та морда
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 12), new THREE.MeshStandardMaterial({ color: 0x3a1502 }));
                head.position.set(0, 1.8, 0.1);
                raceGroup.add(head);

                const snout = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.25, 0.4), new THREE.MeshStandardMaterial({ color: 0x270d01 }));
                snout.position.set(0, 1.75, 0.4);
                raceGroup.add(snout);

                // Вуха
                const earL = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.3, 4), new THREE.MeshStandardMaterial({ color: 0x270d01 }));
                earL.position.set(-0.25, 2.2, 0);
                raceGroup.add(earL);

                const earR = earL.clone();
                earR.position.x = 0.25;
                raceGroup.add(earR);

                // Сяючі червоно-жовті очі
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
                const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.1), eyeMat);
                eyeL.position.set(-0.15, 1.85, 0.32);
                raceGroup.add(eyeL);

                const eyeR = eyeL.clone();
                eyeR.position.x = 0.15;
                raceGroup.add(eyeR);

                // Масивні руки з пазурами
                const armL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 0.25), new THREE.MeshStandardMaterial({ color: 0x3a1502 }));
                armL.position.set(-0.55, 1.1, 0.2);
                armL.rotation.x = 0.4;
                raceGroup.add(armL);

                const armR = armL.clone();
                armR.position.x = 0.55;
                raceGroup.add(armR);

                // Кольори аури
                heroLight.color.setHex(0xff3300);
                auraRing.material.color.setHex(0xff3300);

                baseSpeed = 11.5;
                document.getElementById('race-title').innerText = '🐺 Оборотень';
                document.getElementById('hp-txt').innerText = '1200';

            } else if (race === 'ghost') {
                // 👻 ПРИВИД: Левитуючий дух у капюшоні, із неоновими очима та плаваючими сферами-руками
                isFloating = true;

                const body = new THREE.Mesh(
                    new THREE.ConeGeometry(0.55, 2.2, 16),
                    new THREE.MeshStandardMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.7, emissive: 0x0891b2 })
                );
                body.position.y = 1.1;
                raceGroup.add(body);

                // Капюшон / Голова
                const hood = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0x0284c7 }));
                hood.position.set(0, 1.9, 0);
                raceGroup.add(hood);

                // Сяючі неоново-білі очі
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), eyeMat);
                eyeL.position.set(-0.12, 1.95, 0.32);
                raceGroup.add(eyeL);

                const eyeR = eyeL.clone();
                eyeR.position.x = 0.12;
                raceGroup.add(eyeR);

                // Плаваючі магічні сфери замість рук
                const handL = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), new THREE.MeshBasicMaterial({ color: 0x67e8f9 }));
                handL.position.set(-0.6, 1.3, 0.2);
                raceGroup.add(handL);

                const handR = handL.clone();
                handR.position.x = 0.6;
                raceGroup.add(handR);

                heroLight.color.setHex(0x00ffff);
                auraRing.material.color.setHex(0x00ffff);

                baseSpeed = 13.5;
                document.getElementById('race-title').innerText = '👻 Привид';
                document.getElementById('hp-txt').innerText = '800';

            } else if (race === 'cadaver') {
                // 🧟 КАДАВР: Велетенський квадратний монстр, з залізними болтами та важким кулаком
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.7, 0.8), new THREE.MeshStandardMaterial({ color: 0x2e2338, roughness: 0.9 }));
                body.position.y = 0.85;
                raceGroup.add(body);

                // Квадратна голова
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.6, 0.65), new THREE.MeshStandardMaterial({ color: 0x3d304a }));
                head.position.set(0, 1.8, 0);
                raceGroup.add(head);

                // Болти на шиї
                const bolt = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.9, 8), new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.9 }));
                bolt.rotation.z = Math.PI / 2;
                bolt.position.set(0, 1.5, 0);
                raceGroup.add(bolt);

                // Токсично-зелені сяючі очі
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x22c55e });
                const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.1, 0.1), eyeMat);
                eyeL.position.set(-0.15, 1.85, 0.31);
                raceGroup.add(eyeL);

                const eyeR = eyeL.clone();
                eyeR.position.x = 0.15;
                raceGroup.add(eyeR);

                // Гігантські масивні кулаки
                const fistL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1.0, 0.35), new THREE.MeshStandardMaterial({ color: 0x1e1726 }));
                fistL.position.set(-0.7, 0.8, 0.1);
                raceGroup.add(fistL);

                const fistR = fistL.clone();
                fistR.position.x = 0.7;
                raceGroup.add(fistR);

                heroLight.color.setHex(0x22c55e);
                auraRing.material.color.setHex(0x22c55e);

                baseSpeed = 9.0;
                document.getElementById('race-title').innerText = '🧟 Кадавр';
                document.getElementById('hp-txt').innerText = '1500';

            } else if (race === 'vampire') {
                // 🧛 ВАМПІР: Витончений готичний граф, високий комір, біле обличчя, рубінові очі та кривава сфера
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.9, 16), new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.3 }));
                body.position.y = 0.95;
                raceGroup.add(body);

                // Голова з блідою шкірою
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), new THREE.MeshStandardMaterial({ color: 0xe2e8f0 }));
                head.position.set(0, 1.85, 0);
                raceGroup.add(head);

                // Високий багряний комір
                const collar = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.1), new THREE.MeshStandardMaterial({ color: 0x991b1b }));
                collar.position.set(0, 1.8, -0.25);
                raceGroup.add(collar);

                // Сяючі рубіново-червоні очі
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xef4444 });
                const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
                eyeL.position.set(-0.11, 1.88, 0.3);
                raceGroup.add(eyeL);

                const eyeR = eyeL.clone();
                eyeR.position.x = 0.11;
                raceGroup.add(eyeR);

                // Рубінова плаваюча сфера крові в руці
                const bloodOrb = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), new THREE.MeshBasicMaterial({ color: 0xdc2626 }));
                bloodOrb.position.set(0.5, 1.3, 0.3);
                raceGroup.add(bloodOrb);

                heroLight.color.setHex(0xdc2626);
                auraRing.material.color.setHex(0xdc2626);

                baseSpeed = 12.0;
                document.getElementById('race-title').innerText = '🧛 Вампір';
                document.getElementById('hp-txt').innerText = '950';
            }

            document.getElementById('speed-txt').innerText = baseSpeed;
            currentRaceModel = raceGroup;
            playerGroup.add(currentRaceModel);
        }

        buildRaceModel('werewolf');

        function selectRace(race) {
            const btns = document.querySelectorAll('.btn-race');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            buildRaceModel(race);
        }

        // --- ДЖОЙСТИК ТА РУХ ---
        const joyZone = document.getElementById('joy-zone');
        const joyStick = document.getElementById('joy-stick');
        let isDragging = false;
        let moveVector = { x: 0, z: 0 };

        function handleStart() { isDragging = true; }
        function handleMove(e) {
            if (!isDragging) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = joyZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const maxRadius = rect.width / 2;
            const distance = Math.hypot(dx, dy);

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            moveVector.x = dx / maxRadius;
            moveVector.z = dy / maxRadius;
        }

        function handleEnd() {
            isDragging = false;
            joyStick.style.transform = `translate(0px, 0px)`;
            moveVector = { x: 0, z: 0 };
        }

        joyZone.addEventListener('touchstart', handleStart, { passive: true });
        window.addEventListener('touchmove', handleMove, { passive: true });
        window.addEventListener('touchend', handleEnd);

        joyZone.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handle

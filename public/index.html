<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEJAVU - Dark MOBA Legends</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- ПАНЕЛЬ ВИБОРУ ДРЕВНІХ РАС --- */
        .race-selector {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(15, 10, 25, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 0, 0, 0.5);
            padding: 6px 10px;
            border-radius: 20px;
            z-index: 10;
            pointer-events: auto;
        }
        .btn-race {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #b8b8b8;
            padding: 6px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-race.active {
            background: rgba(139, 0, 0, 0.4);
            border-color: #ff3333;
            color: #fff;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.5);
        }

        /* --- ВЕРХНІЙ HUD --- */
        .hud-container {
            position: absolute;
            top: 60px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(15, 10, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 0, 0, 0.3);
            padding: 8px 14px;
            border-radius: 8px;
            min-width: 170px;
        }
        .player-info {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
        }
        .hp-bar-bg {
            width: 100%;
            height: 8px;
            background: #2a1111;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 0, 0.4);
        }
        .hp-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #dc2626, #991b1b);
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            color: #facc15;
            font-size: 11px;
        }

        /* --- СЕНСОРНЕ КЕРУВАННЯ --- */
        .controls-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px 20px 30px;
        }
        .joystick-zone {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(220, 38, 38, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            position: relative;
        }
        .joystick-stick {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #dc2626, #7f1d1d);
            border: 2px solid #fca5a5;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(220, 38, 38, 0.6);
            position: absolute;
        }
        .action-zone {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            pointer-events: auto;
        }
        .btn-game {
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-game:active { transform: scale(0.92); }
        .btn-skill { width: 55px; height: 55px; background: linear-gradient(135deg, #7c3aed, #5b21b6); border-color: #8b5cf6; font-size: 11px; }
        .btn-attack { width: 75px; height: 75px; background: linear-gradient(135deg, #dc2626, #991b1b); border-color: #f87171; font-size: 14px; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <!-- Вибір темних рас -->
    <div class="race-selector">
        <button class="btn-race active" onclick="selectRace('werewolf')">🐺 Оборотень</button>
        <button class="btn-race" onclick="selectRace('ghost')">👻 Привид</button>
        <button class="btn-race" onclick="selectRace('cadaver')">🧟 Кадавр</button>
        <button class="btn-race" onclick="selectRace('vampire')">🧛 Вампір</button>
    </div>

    <!-- HUD -->
    <div class="hud-container">
        <div class="player-info">
            <span id="race-title">Оборотень</span>
            <span style="color: #ef4444;">LVL 1</span>
        </div>
        <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp-fill"></div></div>
        <div class="stats-row">
            <span>❤️ HP: <strong id="hp-txt">1200</strong></span>
            <span>⚡ Швидкість: <strong id="speed-txt">11</strong></span>
        </div>
    </div>

    <!-- Керування -->
    <div class="controls-layer">
        <div class="joystick-zone" id="joy-zone">
            <div class="joystick-stick" id="joy-stick"></div>
        </div>
        <div class="action-zone">
            <button class="btn-game btn-skill" onclick="triggerSkill()">SKILL</button>
            <button class="btn-game btn-attack" onclick="triggerAttack()">ATTACK</button>
        </div>
    </div>

    <script>
        // --- THREE.JS SETUP ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        scene.fog = new THREE.FogExp2(0x05050a, 0.025);

        const clock = new THREE.Clock();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 18, 18);
        camera.lookAt(0, 0, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xff4444, 0.6);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Темна містична земля
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            new THREE.MeshStandardMaterial({ color: 0x0f1410, roughness: 0.9 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(80, 40, 0xef4444, 0x1f1b24);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- ДРЕВНЯ РУЇНА / ХРАМ У ЦЕНТРІ ---
        const templeGroup = new THREE.Group();
        templeGroup.position.set(0, 0, -10);
        const templeBase = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 6), new THREE.MeshStandardMaterial({ color: 0x181824, roughness: 0.8 }));
        templeBase.position.y = 1.5;
        templeGroup.add(templeBase);
        const templeRoof = new THREE.Mesh(new THREE.ConeGeometry(4, 2, 4), new THREE.MeshStandardMaterial({ color: 0x7f1d1d }));
        templeRoof.position.y = 4;
        templeGroup.add(templeRoof);
        scene.add(templeGroup);

        // --- ГРУПА ПЕРСОНАЖА ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        let currentRaceModel = null;
        let baseSpeed = 11;
        let isFloating = false;

        // --- ГЕНЕРАТОР 3D МОДЕЛЕЙ ДЛЯ 4 ДРЕВНІХ РАС ---
        function buildRaceModel(race) {
            if (currentRaceModel) playerGroup.remove(currentRaceModel);
            
            const raceGroup = new THREE.Group();
            isFloating = false;

            if (race === 'werewolf') {
                // Оборотень: дикий рудувато-темний воїн із плечовими шипами
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.5, 1.9, 16), new THREE.MeshStandardMaterial({ color: 0x451a03, roughness: 0.7 }));
                body.position.y = 0.95;
                raceGroup.add(body);

                const clawL = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 8), new THREE.MeshStandardMaterial({ color: 0x78350f }));
                clawL.position.set(-0.6, 1.5, 0.2);
                clawL.rotation.x = 0.5;
                raceGroup.add(clawL);

                const clawR = clawL.clone();
                clawR.position.x = 0.6;
                raceGroup.add(clawR);

                baseSpeed = 11.5;
                document.getElementById('race-title').innerText = '🐺 Оборотень';
                document.getElementById('hp-txt').innerText = '1200';

            } else if (race === 'ghost') {
                // Привид: напівпрозорий бірюзово-білий дух, що левитує
                isFloating = true;
                const body = new THREE.Mesh(new THREE.ConeGeometry(0.5, 2.2, 16), new THREE.MeshStandardMaterial({ color: 0x2dd4bf, transparent: true, opacity: 0.65, emissive: 0x0d9488 }));
                body.position.y = 1.1;
                raceGroup.add(body);

                const core = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                core.position.set(0, 1.8, 0);
                raceGroup.add(core);

                baseSpeed = 13.5; // Найшвидший
                document.getElementById('race-title').innerText = '👻 Привид';
                document.getElementById('hp-txt').innerText = '800';

            } else if (race === 'cadaver') {
                // Кадавр: масивна похмура нежить фіолетового відтінку
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.8, 0.7), new THREE.MeshStandardMaterial({ color: 0x3b2b46, roughness: 0.9 }));
                body.position.y = 0.9;
                raceGroup.add(body);

                const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.6), new THREE.MeshStandardMaterial({ color: 0x4a3b5c }));
                head.position.set(0, 1.9, 0);
                raceGroup.add(head);

                baseSpeed = 9.0; // Повільний та витривалий
                document.getElementById('race-title').innerText = '🧟 Кадавр';
                document.getElementById('hp-txt').innerText = '1500';

            } else if (race === 'vampire') {
                // Вампір: елегантний чорно-червоний аристократ ночі
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 2.0, 16), new THREE.MeshStandardMaterial({ color: 0x18181b, roughness: 0.3 }));
                body.position.y = 1.0;
                raceGroup.add(body);

                const cape = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.8, 4), new THREE.MeshStandardMaterial({ color: 0x991b1b }));
                cape.position.set(0, 1.0, -0.2);
                cape.rotation.y = Math.PI / 4;
                raceGroup.add(cape);

                baseSpeed = 12.0;
                document.getElementById('race-title').innerText = '🧛 Вампір';
                document.getElementById('hp-txt').innerText = '950';
            }

            document.getElementById('speed-txt').innerText = baseSpeed;
            currentRaceModel = raceGroup;
            playerGroup.add(currentRaceModel);
        }

        buildRaceModel('werewolf');

        function selectRace(race) {
            const btns = document.querySelectorAll('.btn-race');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            buildRaceModel(race);
        }

        // --- ДЖОЙСТИК ТА РУХ ---
        const joyZone = document.getElementById('joy-zone');
        const joyStick = document.getElementById('joy-stick');
        let isDragging = false;
        let moveVector = { x: 0, z: 0 };

        function handleStart() { isDragging = true; }
        function handleMove(e) {
            if (!isDragging) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = joyZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const maxRadius = rect.width / 2;
            const distance = Math.hypot(dx, dy);

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            moveVector.x = dx / maxRadius;
            moveVector.z = dy / maxRadius;
        }

        function handleEnd() {
            isDragging = false;
            joyStick.style.transform = `translate(0px, 0px)`;
            moveVector = { x: 0, z: 0 };
        }

        joyZone.addEventListener('touchstart', handleStart, { passive: true });
        window.addEventListener('touchmove', handleMove, { passive: true });
        window.addEventListener('touchend', handleEnd);

        joyZone.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        function triggerAttack() { console.log("⚔️ Темна атака!"); }
        function triggerSkill() { console.log("⚡ Магічний скілл!"); }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- РЕНДЕР ЦИКЛ ---
        let timeTracker = 0;
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            timeTracker += delta;

            if (moveVector.x !== 0 || moveVector.z !== 0) {
                const moveStep = baseSpeed * delta;
                playerGroup.position.x += moveVector.x * moveStep;
                playerGroup.position.z += moveVector.z * moveStep;

                const angle = Math.atan2(moveVector.x, moveVector.z);
                playerGroup.rotation.y = angle;
            }

            // Ефект левітації для привиде
            if (isFloating) {
                playerGroup.position.y = Math.sin(timeTracker * 5) * 0.25;
            } else {
                playerGroup.position.y = 0;
            }

            camera.position.x = playerGroup.position.x;
            camera.position.z = playerGroup.position.z + 18;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
